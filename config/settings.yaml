# config settings
model_architecture:
  hidden_dim: 16
  gnn_layers: 1
  temporal_layers: 1
  dropout: 0.1
  gnn_type: "GCN"

training:
  epochs: 10
  batch_size: 128
  learning_rate: 0.001

detection:
  threshold_percentile: 99
  rain_multiplier: 2.0

preprocessing:
  # Gaps shorter than this (in hours) are filled by linear time-interpolation.
  # Longer gaps are left as NaN and excluded by the validity check downstream.
  imputation_limit_hours: 3